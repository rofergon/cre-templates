<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 2860" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091126"/>
      <stop offset="100%" stop-color="#142344"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7dd3fc"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1840" height="2860" fill="url(#bg)"/>

  <rect x="30" y="24" width="1780" height="110" rx="14" fill="url(#header)" filter="url(#shadow)"/>
  <text x="920" y="66" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">
    Private Rounds Market Flow (explicit Solidity contract interactions)
  </text>
  <text x="920" y="100" text-anchor="middle" fill="#ccfbf1" font-size="15">
    Source analysis: run-private-rounds-market-flow.mjs + main.ts + EquityWorkflowReceiver.sol + PrivateRoundsMarket.sol + ComplianceV2.sol
  </text>

  <!-- Lanes -->
  <g>
    <rect x="40" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="220" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="400" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="580" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="760" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="940" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="1120" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="1300" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="1480" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>
    <rect x="1660" y="170" width="160" height="2380" rx="10" fill="#111a3a" stroke="#334155"/>

    <text x="120" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">Admin / Oracle</text>
    <text x="120" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">run-private-rounds-market-flow.mjs</text>

    <text x="300" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">Buyer EOA</text>
    <text x="300" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">investor wallet</text>

    <text x="480" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">CRE / Direct report</text>
    <text x="480" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">main.ts or direct onReport</text>

    <text x="660" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">EquityWorkflowReceiver.sol</text>
    <text x="660" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">onReport dispatcher</text>

    <text x="840" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">IdentityRegistry.sol</text>
    <text x="840" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">identity + country</text>

    <text x="1020" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">ComplianceV2.sol</text>
    <text x="1020" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">auth + lockup gate</text>

    <text x="1200" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">PrivateRoundsMarket.sol</text>
    <text x="1200" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">rounds + purchases</text>

    <text x="1380" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">MockUSDC.sol</text>
    <text x="1380" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">mint/approve/escrow</text>

    <text x="1560" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">Token (ERC3643)</text>
    <text x="1560" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">mint + transfer checks</text>

    <text x="1740" y="206" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">Treasury</text>
    <text x="1740" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">USDC settlement sink</text>
  </g>

  <!-- Step blocks -->
  <rect x="30" y="270" width="1780" height="320" rx="12" fill="#0f172a" stroke="#38bdf8"/>
  <rect x="30" y="610" width="1780" height="250" rx="12" fill="#0f172a" stroke="#f59e0b"/>
  <rect x="30" y="880" width="1780" height="260" rx="12" fill="#0f172a" stroke="#ef4444"/>
  <rect x="30" y="1160" width="1780" height="320" rx="12" fill="#0f172a" stroke="#22c55e"/>
  <rect x="30" y="1500" width="1780" height="170" rx="12" fill="#0f172a" stroke="#f43f5e"/>
  <rect x="30" y="1690" width="1780" height="280" rx="12" fill="#0f172a" stroke="#fb7185"/>
  <rect x="30" y="1990" width="1780" height="360" rx="12" fill="#0f172a" stroke="#a78bfa"/>
  <rect x="30" y="2370" width="1780" height="180" rx="12" fill="#0f172a" stroke="#60a5fa"/>

  <!-- Titles -->
  <text x="60" y="304" fill="#7dd3fc" font-size="20" font-weight="700">Step 1. Compliance and KYC baseline via receiver actions</text>
  <text x="60" y="644" fill="#fbbf24" font-size="20" font-weight="700">Step 2. Round creation and activation</text>
  <text x="60" y="914" fill="#f87171" font-size="20" font-weight="700">Step 3. Unauthorized buy negative test</text>
  <text x="60" y="1194" fill="#4ade80" font-size="20" font-weight="700">Step 4. Authorize buyer, buy, settle to treasury</text>
  <text x="60" y="1534" fill="#fb7185" font-size="20" font-weight="700">Step 5. Investor cap exceeded negative test</text>
  <text x="60" y="1724" fill="#fda4af" font-size="20" font-weight="700">Step 6. Oracle refund path</text>
  <text x="60" y="2024" fill="#c4b5fd" font-size="20" font-weight="700">Step 7. Global resale restrictions (lockup + unauthorized destination)</text>
  <text x="60" y="2404" fill="#93c5fd" font-size="20" font-weight="700">Step 8. Extracted interaction matrix</text>

  <!-- Step 1 -->
  <line x1="120" y1="350" x2="480" y2="350" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="338" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_SET_TOKEN_COMPLIANCE, SYNC_KYC, SYNC_SET_INVESTOR_AUTH</text>

  <line x1="480" y1="380" x2="660" y2="380" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="570" y="368" text-anchor="middle" fill="#e2e8f0" font-size="12">onReport(actionType, payload)</text>

  <line x1="660" y1="420" x2="1560" y2="420" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1110" y="408" text-anchor="middle" fill="#e2e8f0" font-size="12">_processSetTokenCompliancePayload() -&gt; Token.setCompliance(complianceAddress)</text>

  <line x1="660" y1="470" x2="840" y2="470" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="458" text-anchor="middle" fill="#e2e8f0" font-size="12">_processKycPayload()</text>

  <line x1="840" y1="500" x2="1020" y2="500" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="930" y="488" text-anchor="middle" fill="#94a3b8" font-size="11">isVerified() used later by market and token gates</text>

  <line x1="660" y1="540" x2="1020" y2="540" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="528" text-anchor="middle" fill="#e2e8f0" font-size="12">_processSetInvestorAuthPayload() -&gt; ComplianceV2.setInvestorAuthorization()</text>

  <text x="60" y="575" fill="#94a3b8" font-size="12">Test default path sets admin=true, buyer=false, unauthorizedRecipient=false before first buy attempt.</text>

  <!-- Step 2 -->
  <line x1="120" y1="700" x2="480" y2="700" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="688" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_CREATE_ROUND / SYNC_SET_ROUND_ALLOWLIST / SYNC_OPEN_ROUND</text>

  <line x1="480" y1="730" x2="660" y2="730" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="760" x2="1200" y2="760" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="748" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; market.createRound(), setRoundAllowlist(), openRound()</text>

  <text x="60" y="815" fill="#94a3b8" font-size="12">Round params in test: start=now-60, end=now+3600, tokenPriceUsdc6=1_000_000, maxUsdc=5_000_000, buyer cap=2_000_000.</text>

  <!-- Step 3 -->
  <line x1="120" y1="970" x2="1380" y2="970" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="958" text-anchor="middle" fill="#e2e8f0" font-size="12">Admin mints USDC to buyer: MockUSDC.mint(buyer, 10_000_000)</text>

  <line x1="300" y1="1010" x2="1380" y2="1010" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="998" text-anchor="middle" fill="#e2e8f0" font-size="12">Buyer approves market: MockUSDC.approve(market, 10_000_000)</text>

  <line x1="300" y1="1060" x2="1200" y2="1060" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="1048" text-anchor="middle" fill="#e2e8f0" font-size="12">buyRound(roundId, 1_000_000, aceRef)</text>

  <line x1="1200" y1="1090" x2="840" y2="1090" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1200" y1="1115" x2="1020" y2="1115" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1110" y="1103" text-anchor="middle" fill="#e2e8f0" font-size="12">market checks isVerified() and isInvestorAuthorized() -&gt; false for buyer</text>

  <text x="60" y="1130" fill="#fca5a5" font-size="12">Expected revert: NotAuthorizedInvestor(). Assertion in test: nextPurchaseId unchanged.</text>

  <!-- Step 4 -->
  <line x1="120" y1="1240" x2="480" y2="1240" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="1228" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_SET_INVESTOR_AUTH(buyer=true)</text>

  <line x1="480" y1="1270" x2="660" y2="1270" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="1300" x2="1020" y2="1300" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="1288" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; ComplianceV2.setInvestorAuthorization(buyer, true)</text>

  <line x1="300" y1="1345" x2="1200" y2="1345" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="1333" text-anchor="middle" fill="#e2e8f0" font-size="12">Buyer retries buyRound -&gt; success (purchase status PENDING)</text>

  <line x1="1200" y1="1380" x2="1380" y2="1380" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1290" y="1368" text-anchor="middle" fill="#e2e8f0" font-size="12">MockUSDC.transferFrom(buyer, market, buyAmount)</text>

  <line x1="120" y1="1430" x2="480" y2="1430" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="1418" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_MARK_PURCHASE_SETTLED</text>

  <line x1="480" y1="1460" x2="660" y2="1460" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="1460" x2="1200" y2="1460" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="1448" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; market.markPurchaseSettled(purchaseId, aceTransferRef)</text>

  <line x1="1200" y1="1460" x2="1380" y2="1460" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1380" y1="1460" x2="1740" y2="1460" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1560" y="1448" text-anchor="middle" fill="#e2e8f0" font-size="12">USDC transfer to treasury</text>

  <!-- Step 5 -->
  <line x1="300" y1="1585" x2="1200" y2="1585" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="1573" text-anchor="middle" fill="#fda4af" font-size="12">buyRound(roundId, 1_500_001) reverts InvestorCapExceeded() because cap=2_000_000 and buyer already purchased 1_000_000</text>

  <text x="60" y="1630" fill="#94a3b8" font-size="12">No purchase is created; cap enforcement is fully on-chain in PrivateRoundsMarket.buyRound().</text>

  <!-- Step 6 -->
  <line x1="120" y1="1770" x2="480" y2="1770" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="1758" text-anchor="middle" fill="#e2e8f0" font-size="12">Create round2 + allowlist + open (same action sequence as step 2)</text>

  <line x1="300" y1="1820" x2="1200" y2="1820" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="1808" text-anchor="middle" fill="#e2e8f0" font-size="12">Buyer buyRound(round2, 1_000_000, aceRef) -&gt; purchase PENDING</text>

  <line x1="120" y1="1880" x2="480" y2="1880" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="1868" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_REFUND_PURCHASE(purchaseId, reason)</text>

  <line x1="480" y1="1910" x2="660" y2="1910" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="1910" x2="1200" y2="1910" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="1898" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; market.refundPurchaseByOracle()</text>

  <line x1="1200" y1="1940" x2="1380" y2="1940" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1380" y1="1940" x2="300" y2="1940" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="1928" text-anchor="middle" fill="#e2e8f0" font-size="12">_applyRefundAccounting() then USDC.transfer(buyer, usdcAmount) and status=REFUNDED</text>

  <!-- Step 7 -->
  <line x1="120" y1="2070" x2="480" y2="2070" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="2058" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_MINT(buyer, 1e18)</text>

  <line x1="480" y1="2100" x2="660" y2="2100" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="2100" x2="1560" y2="2100" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1110" y="2088" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; Token.mint(buyer, amount)</text>

  <line x1="1560" y1="2130" x2="840" y2="2130" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1560" y1="2155" x2="1020" y2="2155" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1290" y="2143" text-anchor="middle" fill="#94a3b8" font-size="11">Token.mint() requires IdentityRegistry.isVerified(to) and ComplianceV2.canTransfer(0,to,amount)</text>

  <line x1="120" y1="2200" x2="480" y2="2200" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="2188" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_SET_INVESTOR_LOCKUP(buyer, now+3600)</text>

  <line x1="480" y1="2230" x2="660" y2="2230" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="2230" x2="1020" y2="2230" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="2218" text-anchor="middle" fill="#e2e8f0" font-size="12">receiver -&gt; ComplianceV2.setInvestorLockup()</text>

  <line x1="300" y1="2275" x2="1560" y2="2275" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="2263" text-anchor="middle" fill="#fca5a5" font-size="12">buyer Token.transfer(admin,1) reverts while lockup active</text>

  <line x1="120" y1="2310" x2="480" y2="2310" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="2298" text-anchor="middle" fill="#e2e8f0" font-size="12">SYNC_SET_INVESTOR_LOCKUP(buyer,0) then buyer transfer succeeds</text>

  <line x1="120" y1="2340" x2="1560" y2="2340" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="2328" text-anchor="middle" fill="#fca5a5" font-size="12">admin Token.transfer(unauthorizedRecipient,1) reverts because destination not authorized</text>

  <!-- Step 8 -->
  <rect x="60" y="2430" width="1720" height="100" rx="10" fill="#111a3a" stroke="#334155"/>
  <text x="90" y="2460" fill="#e2e8f0" font-size="14" font-weight="700">Direct calls between contracts in this flow</text>
  <text x="90" y="2486" fill="#cbd5e1" font-size="12">1) EquityWorkflowReceiver.sol -&gt; IdentityRegistry.sol: registerIdentity()/setCountry()/deleteIdentity()</text>
  <text x="90" y="2508" fill="#cbd5e1" font-size="12">2) EquityWorkflowReceiver.sol -&gt; ComplianceV2.sol: setInvestorAuthorization()/setInvestorLockup()</text>

  <rect x="60" y="2540" width="1720" height="100" rx="10" fill="#111a3a" stroke="#334155"/>
  <text x="90" y="2566" fill="#cbd5e1" font-size="12">3) EquityWorkflowReceiver.sol -&gt; PrivateRoundsMarket.sol: createRound()/setRoundAllowlist()/openRound()/markPurchaseSettled()/refundPurchaseByOracle()</text>
  <text x="90" y="2588" fill="#cbd5e1" font-size="12">4) PrivateRoundsMarket.sol -&gt; IdentityRegistry.sol and ComplianceV2.sol in buyRound() gates</text>
  <text x="90" y="2610" fill="#cbd5e1" font-size="12">5) PrivateRoundsMarket.sol -&gt; MockUSDC.sol: transferFrom() escrow, transfer() settlement/refund</text>
  <text x="90" y="2632" fill="#cbd5e1" font-size="12">6) Token.sol -&gt; IdentityRegistry.sol and ComplianceV2.sol for mint()/transfer() compliance enforcement</text>

  <rect x="30" y="2670" width="1780" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="920" y="2707" text-anchor="middle" fill="#99f6e4" font-size="13">
    Diagram aligned to run-private-rounds-market-flow.mjs: unauthorized buy fail, settle path, cap fail, refund path, lockup and unauthorized-destination transfer fail.
  </text>
</svg>
